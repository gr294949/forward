name: Douban Movie Sync

on:
  schedule:
    - cron: '0 18 * * *' # 每天北京时间凌晨 2 点运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 统一时区，方便日志对齐
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      DOUBAN_API_KEY: ${{ secrets.DOUBAN_API_KEY }}
      BASE_URL: ${{ secrets.BASE_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 使用 --no-package-lock --no-save 避免产生临时文件
      - name: Install dependencies
        run: npm install axios --no-package-lock --no-save

      - name: Create data directory
        run: mkdir -p data

      - name: Run Sync
        run: node scripts/douban_movie.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 仅添加数据文件，避免添加 node_modules
          git add data/douban_movie_data.json
          
          # 模仿猫眼脚本的健壮性写法：检查是否有变动，无变动不提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新豆瓣片单数据 [skip ci]" && git push)
