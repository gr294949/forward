name: Bilibili Animation Sync

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios --no-package-lock --no-save

      - name: Create data directory
        run: mkdir -p data

      - name: Run Bilibili Sync
        run: node scripts/bilibili_animation.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add data/bilibili_animation_data.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新" && git push)
